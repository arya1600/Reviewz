# Netlify — https://docs.netlify.com/configure-builds/overview/
#
# After connect: Site settings → Environment variables → add:
#   VITE_SUPABASE_URL
#   VITE_SUPABASE_ANON_KEY
#
# Supabase Auth → URL Configuration → add your Netlify URL:
#   https://YOUR_SITE.netlify.app
#   https://YOUR_SITE.netlify.app/reset-mpin
# (and your custom domain if you add one)

[build]
  command = "npm run build"
  publish = "dist"

# React Router (client-side routes) — without this, /dashboard etc. return 404 on refresh
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
